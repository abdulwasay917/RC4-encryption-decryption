<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Encryption Dashboard</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.panel{
    width:95%;
    max-width:950px;
    background: rgba(255,255,255,0.08);
    padding:25px;
    border-radius:15px;
    backdrop-filter: blur(10px);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.row{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

.card{
    flex:1;
    min-width:180px;
}

label{
    font-size:12px;
    opacity:0.8;
}

input,select{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-top:5px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.encrypt{
    background:#00c853;
}

.decrypt{
    background:#ff1744;
}

.download{
    background:#2979ff;
}

.status{
    text-align:center;
    margin-top:10px;
    font-size:14px;
}

.small{
    font-size:12px;
    opacity:0.7;
    text-align:center;
}
</style>
</head>

<body>

<div class="panel">
    <h2>🔐 Encryption Dashboard (RC4)</h2>

    <div class="row">
        <div class="card">
            <label>File</label>
            <input type="file" id="file">
        </div>

        <div class="card">
            <label>Password</label>
            <input type="password" id="password">
        </div>

        <div class="card">
            <label>Mode</label>
            <select id="type">
                <option value="encrypt">Encrypt</option>
                <option value="decrypt">Decrypt</option>
            </select>
        </div>
    </div>

    <div class="row">
        <div class="card">
            <button class="encrypt" onclick="processFile()">PROCESS</button>
        </div>
    </div>

    <div class="status" id="status"></div>

    <div class="row">
        <div class="card">
            <button class="download" onclick="downloadFile()">DOWNLOAD</button>
        </div>
    </div>

    <div class="small">Backend: Flask + RC4 + SHA-256</div>
</div>

<script>
const API = "http://localhost:5000";
let lastFile="";

async function processFile(){

    const file=document.getElementById("file").files[0];
    const password=document.getElementById("password").value;
    const type=document.getElementById("type").value;

    if(!file || !password){
        document.getElementById("status").innerText="Fill all fields";
        return;
    }

    const form=new FormData();
    form.append("file",file);
    form.append("password",password);
    form.append("type",type);

    const res=await fetch(`${API}/api/process`,{
        method:"POST",
        body:form
    });

    const data=await res.json();

    if(data.success){
        lastFile=data.filename;
        document.getElementById("status").innerText="Done ✔ " + data.filename;
    }else{
        document.getElementById("status").innerText="Error ❌ " + data.error;
    }
}

function downloadFile(){
    if(!lastFile){
        alert("No file processed yet");
        return;
    }
    window.open(`${API}/api/download/${lastFile}`);
}
</script>

</body>
</html>
